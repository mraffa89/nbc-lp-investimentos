server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Compressão Gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Cache de Assets Estáticos (JS, CSS, Imagens, Fontes) ─────────────────
    location ~* \.(js|css|webp|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── HTML: sem cache (para receber atualizações imediatamente) ────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # ─── SPA Routing (React Router / história de navegação) ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Tratamento de erro ───────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

